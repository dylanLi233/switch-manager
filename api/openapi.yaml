openapi: 3.1.0
info:
  title: Switch Manager API
  version: 0.4.0
  description: >-
    Vendor-neutral switch management API. Vendor-specific names and command
    semantics are validated by the selected plugin. ACL remains explicitly
    experimental-v1. MAC and ARP queries validate the complete device result
    before applying API pagination and enforce a server-controlled result limit.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /switches/{switchId}/vlans:
    get:
      operationId: listVlans
      x-required-permission: operation.query
      parameters: [{ $ref: '#/components/parameters/SwitchID' }]
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    post:
      operationId: createVlan
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateVLANRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '202': { $ref: '#/components/responses/OperationAccepted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /switches/{switchId}/vlans/{vlanId}:
    get:
      operationId: getVlan
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/VLANID'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    patch:
      operationId: updateVlan
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/VLANID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateVLANRequest' } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    delete:
      operationId: deleteVlan
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/VLANID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }

  /switches/{switchId}/interfaces:
    get:
      operationId: listInterfaces
      x-required-permission: operation.query
      parameters: [{ $ref: '#/components/parameters/SwitchID' }]
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}:
    get:
      operationId: getInterface
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}:enable:
    post:
      operationId: enableInterface
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}:disable:
    post:
      operationId: disableInterface
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}/access:
    put:
      operationId: setInterfaceAccessMode
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/InterfaceAccessRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}/trunk:
    put:
      operationId: setInterfaceTrunkMode
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/InterfaceTrunkRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}/vlans:
    post:
      operationId: addInterfaceVlanMembership
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/InterfaceMembershipRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/interfaces/{interfaceName}/vlans/{vlanId}:
    delete:
      operationId: removeInterfaceVlanMembership
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/InterfaceName'
        - $ref: '#/components/parameters/VLANID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }

  /switches/{switchId}/routes:
    get:
      operationId: listStaticRoutes
      x-required-permission: operation.query
      parameters: [{ $ref: '#/components/parameters/SwitchID' }]
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    post:
      operationId: createStaticRoute
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StaticRouteRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/routes/{routeId}:
    get:
      operationId: getStaticRoute
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/RouteID'
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    patch:
      operationId: updateStaticRoute
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/RouteID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StaticRouteRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    delete:
      operationId: deleteStaticRoute
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/RouteID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } } }
      responses: { '200': { $ref: '#/components/responses/OperationSuccess' }, '202': { $ref: '#/components/responses/OperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }

  /switches/{switchId}/acls:
    get:
      operationId: listExperimentalAcls
      x-experimental: true
      x-experimental-schema-version: experimental-v1
      x-required-permission: operation.query
      parameters: [{ $ref: '#/components/parameters/SwitchID' }]
      responses: { '200': { $ref: '#/components/responses/ExperimentalOperationSuccess' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    post:
      operationId: createExperimentalAcl
      x-experimental: true
      x-experimental-schema-version: experimental-v1
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ExperimentalACLRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/ExperimentalOperationSuccess' }, '202': { $ref: '#/components/responses/ExperimentalOperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
  /switches/{switchId}/acls/{aclId}:
    get:
      operationId: getExperimentalAcl
      x-experimental: true
      x-experimental-schema-version: experimental-v1
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/ACLID'
      responses: { '200': { $ref: '#/components/responses/ExperimentalOperationSuccess' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    patch:
      operationId: updateExperimentalAcl
      x-experimental: true
      x-experimental-schema-version: experimental-v1
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/ACLID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ExperimentalACLRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/ExperimentalOperationSuccess' }, '202': { $ref: '#/components/responses/ExperimentalOperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }
    delete:
      operationId: deleteExperimentalAcl
      x-experimental: true
      x-experimental-schema-version: experimental-v1
      x-required-permission: operation.config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/ACLID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/OperationOptions' } } } }
      responses: { '200': { $ref: '#/components/responses/ExperimentalOperationSuccess' }, '202': { $ref: '#/components/responses/ExperimentalOperationAccepted' }, '400': { $ref: '#/components/responses/BadRequest' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '422': { $ref: '#/components/responses/Unprocessable' } }

  /switches/{switchId}/mac-table:
    get:
      operationId: listMacTable
      summary: Query, validate, limit, and paginate the complete MAC table
      description: >-
        The service validates the complete device result before pagination. The
        caller cannot override the server result limit. If the full table exceeds
        that limit the operation fails with RESULT_TOO_LARGE (HTTP 422).
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /switches/{switchId}/arp-table:
    get:
      operationId: listArpTable
      summary: Query, validate, limit, and paginate the complete ARP table
      description: >-
        The service validates the complete device result before pagination. The
        caller cannot override the server result limit. If the full table exceeds
        that limit the operation fails with RESULT_TOO_LARGE (HTTP 422).
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /switches/{switchId}/status:
    get:
      operationId: getDeviceStatus
      summary: Get one normalized device status snapshot
      description: This endpoint accepts no query parameters.
      x-required-permission: operation.query
      parameters:
        - $ref: '#/components/parameters/SwitchID'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    SwitchID: { name: switchId, in: path, required: true, schema: { type: string, minLength: 1 } }
    VLANID: { name: vlanId, in: path, required: true, schema: { type: integer, minimum: 1, maximum: 4094 } }
    InterfaceName:
      name: interfaceName
      in: path
      required: true
      description: Plugin-specific interface name. Slash characters must be percent-encoded inside this path segment.
      schema: { type: string, minLength: 1, maxLength: 128 }
    RouteID: { name: routeId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64 } }
    ACLID: { name: aclId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64 } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string, minLength: 1, maxLength: 128 } }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 1000000, default: 1 }
    PageSize:
      name: page_size
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
  headers:
    ExperimentalACL:
      description: Experimental ACL schema version.
      schema: { type: string, const: experimental-v1 }
  schemas:
    OperationOptions:
      type: object
      additionalProperties: false
      properties:
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    CreateVLANRequest:
      type: object
      additionalProperties: false
      required: [vlan_id]
      properties:
        vlan_id: { type: integer, minimum: 1, maximum: 4094 }
        name: { type: string, maxLength: 64 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    UpdateVLANRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    InterfaceAccessRequest:
      type: object
      additionalProperties: false
      required: [vlan_id]
      properties:
        vlan_id: { type: integer, minimum: 1, maximum: 4094 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    InterfaceTrunkRequest:
      type: object
      additionalProperties: false
      required: [allowed_vlans]
      properties:
        allowed_vlans: { type: array, minItems: 1, uniqueItems: true, items: { type: integer, minimum: 1, maximum: 4094 } }
        native_vlan: { type: integer, minimum: 1, maximum: 4094 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    InterfaceMembershipRequest:
      type: object
      additionalProperties: false
      required: [vlan_id]
      properties:
        vlan_id: { type: integer, minimum: 1, maximum: 4094 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    StaticRouteRequest:
      type: object
      additionalProperties: false
      required: [address_family, destination, next_hop]
      properties:
        address_family: { type: string, enum: [IPV4, IPV6] }
        destination: { type: string, description: CIDR normalized to its network prefix }
        next_hop: { type: string }
        outgoing_interface: { type: string, maxLength: 128 }
        description: { type: string, maxLength: 256 }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    PortRange:
      type: object
      additionalProperties: false
      required: [start, end]
      properties:
        start: { type: integer, minimum: 1, maximum: 65535 }
        end: { type: integer, minimum: 1, maximum: 65535 }
    ACLRule:
      type: object
      additionalProperties: false
      required: [sequence, action, protocol, source, destination]
      properties:
        sequence: { type: integer, minimum: 1, maximum: 65535 }
        action: { type: string, enum: [PERMIT, DENY] }
        protocol: { type: string, enum: [ANY, TCP, UDP, ICMP] }
        source: { type: string, description: "any or CIDR" }
        destination: { type: string, description: "any or CIDR" }
        source_ports: { type: array, items: { $ref: '#/components/schemas/PortRange' } }
        destination_ports: { type: array, items: { $ref: '#/components/schemas/PortRange' } }
        description: { type: string, maxLength: 256 }
    ExperimentalACLRequest:
      type: object
      additionalProperties: false
      required: [schema_version, name, address_family, rules]
      properties:
        schema_version: { type: string, const: experimental-v1 }
        name: { type: string, minLength: 1, maxLength: 64 }
        description: { type: string, maxLength: 256 }
        address_family: { type: string, enum: [ANY, IPV4, IPV6] }
        rules: { type: array, minItems: 1, maxItems: 256, items: { $ref: '#/components/schemas/ACLRule' } }
        execution_mode: { type: string, enum: [SYNC, ASYNC], default: SYNC }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    MACEntry:
      type: object
      additionalProperties: false
      required: [mac_address, vlan_id, interface_name, entry_type, age_seconds]
      properties:
        mac_address: { type: string, example: '00:11:22:33:44:55' }
        vlan_id: { type: integer, minimum: 1, maximum: 4094 }
        interface_name: { type: string, minLength: 1, maxLength: 128 }
        entry_type: { type: string, enum: [DYNAMIC, STATIC] }
        age_seconds: { type: integer, minimum: 0 }
    MACPage:
      type: object
      additionalProperties: false
      required: [entries, page, page_size, total]
      properties:
        entries: { type: array, items: { $ref: '#/components/schemas/MACEntry' } }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 500 }
        total: { type: integer, minimum: 0 }
    ARPEntry:
      type: object
      additionalProperties: false
      required: [ip_address, interface_name, state, age_seconds]
      properties:
        ip_address: { type: string }
        mac_address: { type: string, example: '00:11:22:33:44:55' }
        interface_name: { type: string, minLength: 1, maxLength: 128 }
        state: { type: string, enum: [REACHABLE, STALE, INCOMPLETE, STATIC, UNKNOWN] }
        age_seconds: { type: integer, minimum: 0 }
    ARPPage:
      type: object
      additionalProperties: false
      required: [entries, page, page_size, total]
      properties:
        entries: { type: array, items: { $ref: '#/components/schemas/ARPEntry' } }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 500 }
        total: { type: integer, minimum: 0 }
    DeviceStatus:
      type: object
      additionalProperties: false
      required: [hostname, uptime_seconds, health_state, active_alarms, collected_at]
      properties:
        hostname: { type: string, minLength: 1, maxLength: 253 }
        uptime_seconds: { type: integer, minimum: 0 }
        health_state: { type: string, enum: [HEALTHY, DEGRADED, CRITICAL, UNKNOWN] }
        cpu_usage_percent: { type: number, minimum: 0, maximum: 100 }
        memory_usage_percent: { type: number, minimum: 0, maximum: 100 }
        temperature_celsius: { type: number, minimum: -100, maximum: 250 }
        active_alarms: { type: array, maxItems: 256, items: { type: string, minLength: 1, maxLength: 256 } }
        collected_at: { type: string, format: date-time }
    SuccessEnvelope:
      type: object
      required: [request_id, success, data]
      properties:
        request_id: { type: string }
        success: { const: true }
        data: { type: object }
    ErrorEnvelope:
      type: object
      required: [request_id, success, error]
      properties:
        request_id: { type: string }
        success: { const: false }
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code: { type: string, description: Includes RESULT_TOO_LARGE and COMMAND_OUTPUT_UNPARSABLE }
            message: { type: string }
            retryable: { type: boolean }
  responses:
    OperationSuccess: { description: Synchronous operation completed, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } } }
    OperationAccepted: { description: Asynchronous or deferred task accepted, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } } }
    ExperimentalOperationSuccess:
      description: Experimental ACL operation completed
      headers: { X-Experimental-API: { $ref: '#/components/headers/ExperimentalACL' } }
      content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } }
    ExperimentalOperationAccepted:
      description: Experimental ACL task accepted
      headers: { X-Experimental-API: { $ref: '#/components/headers/ExperimentalACL' } }
      content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } }
    BadRequest: { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    Unauthorized: { description: Authentication required, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    Forbidden: { description: Permission denied, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    NotFound: { description: Resource not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    Conflict: { description: Idempotency or state conflict, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    Unprocessable: { description: Unsupported capability, result too large, or unparseable output, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
