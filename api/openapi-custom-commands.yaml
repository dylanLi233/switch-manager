openapi: 3.1.0
info:
  title: Switch Manager Custom Command API
  version: 0.5.0
  description: >-
    Security-gated custom command endpoints. Commands are evaluated by a
    server-side, plugin-supplied allow/block policy and a trusted core engine.
    Any matching BLOCKED rule is absolute and cannot be bypassed by an
    administrator or confirm_risk.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /switches/{switchId}/commands:readonly:
    post:
      operationId: executeReadonlyCustomCommands
      x-required-permission: operation.custom_read
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadonlyCommandRequest'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '202': { $ref: '#/components/responses/OperationAccepted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /switches/{switchId}/commands:config:
    post:
      operationId: executeConfigurationCustomCommands
      x-required-permission: operation.custom_config
      parameters:
        - $ref: '#/components/parameters/SwitchID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigCommandRequest'
      responses:
        '200': { $ref: '#/components/responses/OperationSuccess' }
        '202': { $ref: '#/components/responses/OperationAccepted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SwitchID:
      name: switchId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 128 }
  schemas:
    ExecutionMode:
      type: string
      enum: [SYNC, ASYNC]
      default: SYNC
    CommandSequence:
      type: array
      minItems: 1
      maxItems: 64
      items:
        type: string
        minLength: 1
        maxLength: 4096
        description: >-
          One CLI command. Newline, carriage return, NUL and other control
          characters are rejected. Effective limits may be lower for a plugin.
    ReadonlyCommandRequest:
      type: object
      additionalProperties: false
      required: [commands]
      properties:
        commands: { $ref: '#/components/schemas/CommandSequence' }
        execution_mode: { $ref: '#/components/schemas/ExecutionMode' }
        dry_run: { type: boolean, default: false }
        confirm_risk: { type: boolean, default: false }
    ConfigCommandRequest:
      type: object
      additionalProperties: false
      required: [commands]
      properties:
        commands: { $ref: '#/components/schemas/CommandSequence' }
        execution_mode: { $ref: '#/components/schemas/ExecutionMode' }
        dry_run: { type: boolean, default: false }
        save_config: { type: boolean, default: false }
        confirm_risk:
          type: boolean
          default: false
          description: Required for HIGH risk rules; never overrides BLOCKED.
    SuccessEnvelope:
      type: object
      required: [request_id, success, data]
      properties:
        request_id: { type: string }
        success: { const: true }
        data:
          type: object
          additionalProperties: true
          properties:
            task_id: { type: string, format: uuid }
            status:
              type: string
              enum: [PENDING, QUEUED, RUNNING, SUCCESS, PARTIAL_SUCCESS, FAILED, CANCELLED, INTERRUPTED]
            dry_run: { type: boolean }
            plan: { type: object, additionalProperties: true }
            result:
              type: object
              properties:
                outputs:
                  type: array
                  items: { type: string }
            error_code: { type: string }
    ErrorEnvelope:
      type: object
      required: [request_id, success, error]
      properties:
        request_id: { type: string }
        success: { const: false }
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR, FORBIDDEN, DANGEROUS_COMMAND_BLOCKED, RISK_CONFIRMATION_REQUIRED, RESULT_TOO_LARGE]
            message: { type: string }
            retryable: { type: boolean }
  responses:
    OperationSuccess:
      description: Synchronous completion or dry-run result
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    OperationAccepted:
      description: Durable task accepted or synchronous wait deferred
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    BadRequest:
      description: Invalid command shape or client options
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Unauthorized:
      description: Authentication required
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Forbidden:
      description: RBAC denial or a dangerous command blocked by policy
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Conflict:
      description: Idempotency or resource-state conflict
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Unprocessable:
      description: Risk confirmation, unsupported capability or result-size failure
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
