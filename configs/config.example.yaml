server:
  listen: "127.0.0.1:8080"
  read_timeout: "15s"
  write_timeout: "60s"
  shutdown_timeout: "15s"
  max_request_bytes: 1048576

database:
  required: false
  dsn: ""

logging:
  level: "info"
  format: "json"

authentication:
  enabled: false
  issuer: ""
  audience: ""
  public_key_file: ""
  key_id: ""
  clock_skew: "30s"
  username_claim: "preferred_username"
  service_actor_claim: "azp"

# Device/Credential API secrets are environment-only and intentionally excluded
# from this YAML file:
#   SWITCH_MANAGER_CREDENTIAL_MASTER_KEY_BASE64  (32 random bytes, base64)
#   SWITCH_MANAGER_CREDENTIAL_KEY_VERSION        (default: v1)
#   SWITCH_MANAGER_SSH_KNOWN_HOSTS_FILE           (required to enable SSH tests)
#   SWITCH_MANAGER_SSH_PROMPT_PATTERN             (verified vendor prompt regex)
#   SWITCH_MANAGER_SSH_PROMPT_FAMILY              (label returned by test-connection)
#   SWITCH_MANAGER_SSH_TEST_TIMEOUT                (default: 10s)
#
# Local/test Fake Runtime. It is disabled by default and requires the inventory
# master key, JWT/RBAC, and PostgreSQL:
#   SWITCH_MANAGER_FAKE_PLUGIN_ENABLED             (true/false, default false)
#   SWITCH_MANAGER_OPERATION_WORKERS               (1-32, default 5)
#   SWITCH_MANAGER_OPERATION_SYNC_WAIT_TIMEOUT     (default 10s, max 1m)
#
# Read-only MAC/ARP query protection. This is service-controlled and cannot be
# overridden by an API caller:
#   SWITCH_MANAGER_QUERY_RESULT_LIMIT              (1-100000, default 5000)
