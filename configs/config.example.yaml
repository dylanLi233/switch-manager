server:
  listen: "127.0.0.1:8080"
  read_timeout: "15s"
  write_timeout: "60s"
  shutdown_timeout: "15s"
  max_request_bytes: 1048576

database:
  required: false
  dsn: ""

logging:
  level: "info"
  format: "json"

authentication:
  enabled: false
  issuer: ""
  audience: ""
  public_key_file: ""
  key_id: ""
  clock_skew: "30s"
  username_claim: "preferred_username"
  service_actor_claim: "azp"
