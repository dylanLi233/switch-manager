name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: switch_manager
          POSTGRES_PASSWORD: switch_manager
          POSTGRES_DB: switch_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switch_manager -d switch_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_DSN: postgres://switch_manager:switch_manager@localhost:5432/switch_manager_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Verify Go modules
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee unit-test.log
      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          if-no-files-found: ignore
      - name: Race tests
        shell: bash
        run: |
          set -o pipefail
          go test -race ./... 2>&1 | tee race-test.log
      - name: Upload race test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: race-test-log
          path: race-test.log
          if-no-files-found: ignore
      - name: Vet
        run: go vet ./...
      - name: Migration integration tests
        run: bash ./scripts/test-migrations.sh
